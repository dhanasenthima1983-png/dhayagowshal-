<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Groove - Portable Edition</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0A0A0A; color: white; margin: 0; overflow: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: white; cursor: pointer; margin-top: -7px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- CDNs -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@19?dev",
            "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
            "three": "https://esm.sh/three@0.160.0",
            "framer-motion": "https://esm.sh/framer-motion@12.0.0-alpha.0",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>

    <script type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { motion, AnimatePresence } from 'framer-motion';
        import { Apple, Play, Pause, Music } from 'lucide-react';

        // 3D Background Scene Component
        const ThreejsScene = () => {
            const mountRef = useRef(null);
            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                mountRef.current.appendChild(renderer.domElement);

                const geometry = new THREE.BoxGeometry(3, 3, 3);
                const material = new THREE.MeshPhongMaterial({ color: 0xff0000, wireframe: true, transparent: true, opacity: 0.1 });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);

                const light = new THREE.PointLight(0xffffff, 100);
                light.position.set(5, 5, 5);
                scene.add(light);
                scene.add(new THREE.AmbientLight(0xffffff, 0.5));
                camera.position.z = 5;

                const animate = () => {
                    requestAnimationFrame(animate);
                    cube.rotation.x += 0.005;
                    cube.rotation.y += 0.005;
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);
                return () => {
                    window.removeEventListener('resize', handleResize);
                    mountRef.current?.removeChild(renderer.domElement);
                };
            }, []);
            return React.createElement('div', { ref: mountRef, className: "absolute inset-0 z-0 pointer-events-none" });
        };

        const App = () => {
            const [isPlaying, setIsPlaying] = useState(true);
            const [bpm, setBpm] = useState(132);
            const [danceMode, setDanceMode] = useState('pulse');

            const beatDuration = (60 / bpm);
            const danceVariants = {
                pulse: { scale: [1, 1.15, 0.95, 1], y: [0, -30, 10, 0], rotate: [-5, 5, -5, 0] },
                twist: { rotate: [0, 45, -45, 0], scale: [1, 1.1, 1], y: [0, -10, 0] },
                slide: { x: [-50, 50, -50], rotate: [-15, 15, -15], scale: [1, 0.9, 1] },
                jelly: { scaleX: [1, 1.4, 0.7, 1], scaleY: [1, 0.6, 1.2, 1], y: [0, 20, -20, 0] },
                hype: { x: [-5, 5, -5, 5, 0], y: [-5, 5, 5, -5, 0], scale: [1, 1.05, 1.1, 1], rotate: [-2, 2, -2, 2, 0] }
            };

            return React.createElement('div', { className: "min-h-screen flex flex-col relative select-none overflow-hidden" },
                React.createElement(ThreejsScene),
                
                // Content Layout
                React.createElement('div', { className: "flex-1 relative z-10 grid grid-cols-1 lg:grid-cols-12 h-screen items-center px-12" },
                    // Left Side
                    React.createElement('div', { className: "lg:col-span-7 flex flex-col justify-center" },
                        React.createElement('div', { className: "mb-8 flex items-center gap-4" },
                            React.createElement('div', { className: "w-12 h-[1px] bg-red-600" }),
                            React.createElement('span', { className: "text-xs uppercase tracking-widest text-red-600 font-black" }, "The Core Motion")
                        ),
                        React.createElement('h1', { className: "text-[100px] leading-[0.85] font-black tracking-tighter uppercase mb-6" }, 
                            "Dancing", React.createElement('br'), React.createElement('span', { className: "text-red-600" }, "Apple")
                        ),
                        React.createElement('p', { className: "text-white/60 max-w-md text-lg font-light" }, 
                            "A standalone exploration of rhythm and form."
                        )
                    ),

                    // Right Side (Apple)
                    React.createElement('div', { className: "lg:col-span-5 flex items-center justify-center p-20" },
                        React.createElement(motion.div, {
                            animate: isPlaying ? danceVariants[danceMode] : {},
                            transition: { duration: danceMode === 'hype' ? beatDuration/2 : beatDuration, repeat: Infinity, ease: "easeInOut" },
                            className: "relative text-red-600"
                        },
                            React.createElement(Apple, { size: 300, fill: "currentColor" }),
                            React.createElement('div', { className: "absolute inset-0 flex flex-col items-center justify-center pt-16" },
                                React.createElement('div', { className: "flex gap-12" },
                                    React.createElement('div', { className: "w-4 h-4 bg-black rounded-full" }),
                                    React.createElement('div', { className: "w-4 h-4 bg-black rounded-full" })
                                ),
                                React.createElement('div', { className: "mt-6 w-12 h-6 border-b-[6px] border-black rounded-[50%]" })
                            )
                        )
                    )
                ),

                // Footer Controls
                React.createElement('div', { className: "h-32 border-t border-white/10 flex items-center px-12 justify-between bg-black/40 backdrop-blur-md absolute bottom-0 w-full z-50" },
                    React.createElement('div', { className: "flex items-center gap-12" },
                        React.createElement('button', { 
                            onClick: () => setIsPlaying(!isPlaying),
                            className: "w-12 h-12 border border-white/20 rounded-full flex items-center justify-center hover:bg-white hover:text-black transition-all"
                        }, isPlaying ? React.createElement(Pause, { size: 18 }) : React.createElement(Play, { size: 18, className: "ml-1" })),
                        
                        React.createElement('div', { className: "w-64 relative" },
                            React.createElement('input', { 
                                type: "range", min: 60, max: 200, value: bpm, 
                                onChange: (e) => setBpm(parseInt(e.target.value)),
                                className: "w-full"
                            }),
                            React.createElement('div', { className: "text-[10px] uppercase text-white/40 mt-2 font-mono" }, bpm, " BPM")
                        )
                    ),
                    React.createElement('div', { className: "flex gap-4" },
                        ['pulse', 'twist', 'slide', 'jelly', 'hype'].map(m => 
                            React.createElement('button', {
                                key: m,
                                onClick: () => setDanceMode(m),
                                className: `px-4 py-2 text-[10px] uppercase font-black border border-white/10 rounded ${danceMode === m ? 'bg-red-600 border-red-600' : 'bg-white/5'}`
                            }, m)
                        )
                    )
                )
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
